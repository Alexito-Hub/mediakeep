steps:
  # ── Step 1: Build Docker image (with cache) ─────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/mediakeep-web:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mediakeep-web:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mediakeep-web:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # ── Step 2: Push image ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/mediakeep-web'

  # ── Step 3: Deploy to Cloud Run ──────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mediakeep-web'
      - '--image=gcr.io/$PROJECT_ID/mediakeep-web:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300s'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=1000'

images:
  - 'gcr.io/$PROJECT_ID/mediakeep-web:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mediakeep-web:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  timeout: '1800s'
  logging: CLOUD_LOGGING_ONLY
