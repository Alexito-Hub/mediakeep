# ─── Gzip compression ───────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    application/wasm
    font/woff
    font/woff2
    application/font-woff
    application/font-woff2;

# ─── Main Flutter web server ─────────────────────────────────────────────────
server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    types { application/wasm wasm; }

    # ── Real IP: trust Cloudflare ranges + Google Cloud ─────────────────────
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # ── Content Security Policy ─────────────────────────────────────────────
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'wasm-unsafe-eval'
                    https://www.gstatic.com
                    https://apis.google.com
                    https://pagead2.googlesyndication.com
                    https://googleads.g.doubleclick.net
                    https://static.cloudflareinsights.com;
        style-src   'self' 'unsafe-inline'
                    https://fonts.googleapis.com;
        font-src    'self' data:
                    https://fonts.gstatic.com;
        img-src     'self' data: blob: https:;
        connect-src 'self'
                    https://*.googleapis.com
                    https://*.firebaseio.com
                    wss://*.firebaseio.com
                    https://*.firebaseapp.com
                    https://*.firebasestorage.app
                    https://storage.googleapis.com
                    https://firebaseinstallations.googleapis.com
                    https://fcmregistrations.googleapis.com
                    https://cloudflareinsights.com
                    https://googleads.g.doubleclick.net
                    https://pagead2.googlesyndication.com;
        worker-src  'self' blob:;
        frame-src   https://accounts.google.com
                    https://googleads.g.doubleclick.net
                    https://tpc.googlesyndication.com;
        object-src  'none';
        base-uri    'self';
    " always;

    # ── index.html – never cache, always fresh ──────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Flutter service worker – must not be cached ─────────────────────────
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── manifest.json – short cache ─────────────────────────────────────────
    location ~* \.(webmanifest|manifest\.json)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── CanvasKit WASM – long cache, explicit MIME ───────────────────────────
    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        types { application/wasm wasm; }
    }

    # ── Flutter hashed JS/WASM assets ────────────────────────────────────────
    location ~* \.(js|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Ensure WASM is served with correct MIME type
    location ~* \.wasm$ {
        add_header Content-Type "application/wasm" always;
    }

    # ── Static assets – long cache ───────────────────────────────────────────
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|mp4|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Flutter asset bundles ────────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── All other routes → Flutter SPA ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check (Cloud Run) ─────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
