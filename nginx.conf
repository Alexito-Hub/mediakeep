server {
    # El puerto será reemplazado dinámicamente por la variable $PORT de Cloud Run
    listen $PORT;
    
    # Soporte para todos los dominios (www.tudominio.com y tudominio.com)
    server_name _;

    # Trust Cloudflare Proxies (Pasa la IP real del usuario en vez de la IP de CF)
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    # Headers de seguridad y proxy recomendados para Cloud Run + Cloudflare
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    root /usr/share/nginx/html;

    # Bloque principal
    location / {
        index index.html index.htm;
        # CRÍTICO para Flutter Web (Single Page Application):
        # Si no encuentra el archivo o directorio, redirige a index.html
        try_files $uri $uri/ /index.html;
        
        # Evitar caché del index.html para siempre servir la última versión
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Caché a largo plazo en el navegador para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Permitir CORS para fuentes cuando se cargan desde CDNs
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }
}
