  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#18181B">
  <meta name="theme-color" content="#ffffff">

  <style id="splash-screen-style">
    body {
      background-color: #ffffff;
      margin: 0;
      min-height: 100vh;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #18181B;
      }
    }

    #splash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 99999;
    }

    .logo-container {
      animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards,
        float 3s ease-in-out infinite 0.8s;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
    }

    .logo-container img {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      object-fit: contain;
    }

    @media (prefers-color-scheme: dark) {
      .logo-container img {
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      }
    }

    .spinner {
      margin: 0 auto;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(0, 0, 0, 0.08);
      border-top-color: #18181B;
      border-right-color: #18181B;
      border-radius: 50%;
      animation: spin 0.85s cubic-bezier(0.6, 0.1, 0.4, 0.9) infinite;
      opacity: 0;
      animation-fill-mode: forwards;
      animation-delay: 0.3s;
    }

    @media (prefers-color-scheme: dark) {
      .spinner {
        border: 3px solid rgba(255, 255, 255, 0.08);
        border-top-color: #ffffff;
        border-right-color: #ffffff;
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: rotate(360deg);
        opacity: 1;
      }
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }

      100% {
        transform: translateY(0px);
      }
    }
  </style>

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>

<body>
  <div id="splash">
    <div class="logo-container">
      <img src="icons/Icon-192.png" alt="mediakeep logo">
    </div>
    <div class="spinner"></div>
  </div>

  <script>
    window.isAdBlockActive = false;
    window.addEventListener('load', function () {
      setTimeout(function () {
        if (typeof adsbygoogle === 'undefined') {
          window.isAdBlockActive = true;
        }
        removeSplashFromWeb();
      }, 1500);
    });

    function pushAd() {
      var adElements = document.getElementsByClassName('adsbygoogle');
      var uninitializedAds = Array.from(adElements).filter(function (el) {
        return el.innerHTML.trim() === '';
      });

      if (uninitializedAds.length > 0) {
        (adsbygoogle = window.adsbygoogle || []).push({});
      }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
