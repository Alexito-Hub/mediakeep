  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #ffffff;
      background-size: 100% 100%;
    }

    @media (prefers-color-scheme: dark) {
      body {
        /* match Flutter dark scaffoldBackgroundColor (0xFF18181B) */
        background-color: #18181B;
      }
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .stretch {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cover {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <!-- theme-color meta tags support light/dark mode and PWAs -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#18181B">
  <meta name="theme-color" content="#ffffff">
</head>

<body>
  <style>
    body { background-color: #ffffff; margin:0; }
    @media (prefers-color-scheme: dark) {
      body { background-color: #18181B; }
    }
    #splash {
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
      pointer-events:none;
    }
    #splash img {
      width:64px; height:64px;
      display:block;
      margin:0 auto;
    }
    #splash .spinner {
      margin-top:8px;
      width:24px; height:24px;
      border:3px solid rgba(0,0,0,0.2);
      border-top-color: rgba(0,0,0,0.7);
      border-radius:50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg);} }
  </style>

  <div id="splash">
    <img src="icons/Icon-192.png" alt="logo">
    <div class="spinner"></div>
  </div>

  <script>
    window.isAdBlockActive = false;
    window.addEventListener('load', function () {
      setTimeout(function () {
        if (typeof adsbygoogle === 'undefined') {
          window.isAdBlockActive = true;
        }
      }, 1500);
    });
    function pushAd() {
      var adElements = document.getElementsByClassName('adsbygoogle');
      var uninitializedAds = Array.from(adElements).filter(function (el) {
        return el.innerHTML.trim() === '';
      });

      if (uninitializedAds.length > 0) {
        try {
          (adsbygoogle = window.adsbygoogle || []).push({});
        } catch (e) {
          console.error("AdSense Push Error (Ignored): " + e);
        }
      }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
